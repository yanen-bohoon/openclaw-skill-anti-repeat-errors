version: "1.0"
kind: phase
name: phase-3
description: Phase 3 - 自动化阶段，减少确认负担
enabled: true
rules:
  - id: phase-3-logging
    name: "记录操作日志"
    condition:
      phase: 3
    content: |
      自动化操作需记录到日志：
      - 操作类型
      - 受影响文件
      - 执行时间
      - 结果状态
    priority: 60
    enabled: true
    tags:
      - logging
      - logging