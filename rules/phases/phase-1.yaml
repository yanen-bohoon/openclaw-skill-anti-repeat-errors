version: "1.0"
kind: phase
name: phase-1
description: Phase 1 - 重要操作确认，安全执行
enabled: true
rules:
  - id: phase-1-confirm-actions
    name: "重要操作需确认"
    condition:
      phase: 1
    content: |
      在执行以下操作前，必须获得用户确认：
      - 删除文件或目录
      - 修改系统配置
      - 安装/卸载软件包
      - 发送外部请求
    priority: 90
    enabled: true
    tags:
      - security
      - confirmation